<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Pi Payment Demo</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>
  <h2>دفع باستخدام Pi</h2>

  <button id="payBtn">ادفع 1 Pi</button>

  <script>
    Pi.init({ version: "2.0" });

    let currentPaymentId = null;

    // تسجيل الدخول
    Pi.authenticate(["payments"]).then(auth => {
      console.log("Authenticated:", auth);
    }).catch(err => {
      console.error(err);
    });

    document.getElementById("payBtn").addEventListener("click", () => {

      Pi.createPayment({
        amount: 1,
        memo: "Test Payment",
        metadata: { type: "test" }
      }, {

        // بعد إنشاء الدفع
        onReadyForServerApproval: async (paymentId) => {
          console.log("Approve:", paymentId);
          currentPaymentId = paymentId;

          await fetch("/.netlify/functions/pi-approve", {
            method: "POST",
            body: JSON.stringify({ paymentId })
          });
        },

        // بعد ما المستخدم يوافق
        onReadyForServerCompletion: async (paymentId, txid) => {
          console.log("Complete:", paymentId, txid);

          await fetch("/.netlify/functions/pi-complete", {
            method: "POST",
            body: JSON.stringify({ paymentId, txid })
          });

          alert("تم الدفع بنجاح ✅");
        },

        // لو المستخدم لغى
        onCancel: async (paymentId) => {
          console.log("Cancel:", paymentId);

          await fetch("/.netlify/functions/pi-cancel", {
            method: "POST",
            body: JSON.stringify({ paymentId })
          });

          alert("تم إلغاء الدفع ❌");
        },

        onError: (error) => {
          console.error("Error:", error);
          alert("حصل خطأ ❗");
        }

      });

    });
  </script>
</body>
</html>
