<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Pi Payment</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>
  <h2>الدفع باستخدام Pi</h2>
  <button id="payBtn">ادفع 1 Pi</button>

  <script>
    // كشف الأخطاء
    window.onerror = function (e) {
      alert("Error: " + e);
    };

    // تأكد إن Pi موجود
    alert("Pi SDK: " + typeof Pi);

    // تهيئة
    Pi.init({ version: "2.0" });

    // تسجيل الدخول
    Pi.authenticate(["payments"])
      .then(auth => {
        alert("تم تسجيل الدخول ✅");
        console.log("Auth:", auth);
      })
      .catch(err => {
        alert("فشل تسجيل الدخول ❌");
        console.error(err);
      });

    // زر الدفع
    document.getElementById("payBtn").onclick = function () {

      alert("تم الضغط على الزر ✅");

      Pi.createPayment({
        amount: 1,
        memo: "Test Payment",
        metadata: { type: "test" }
      }, {

        onReadyForServerApproval: async (paymentId) => {
          alert("Approve 🔵");

          await fetch("/.netlify/functions/pi-approve", {
            method: "POST",
            body: JSON.stringify({ paymentId })
          });
        },

        onReadyForServerCompletion: async (paymentId, txid) => {
          alert("Complete 🟢");

          await fetch("/.netlify/functions/pi-complete", {
            method: "POST",
            body: JSON.stringify({ paymentId, txid })
          });

          alert("تم الدفع بنجاح ✅");
        },

        onCancel: async (paymentId) => {
          alert("Cancel 🔴");

          await fetch("/.netlify/functions/pi-cancel", {
            method: "POST",
            body: JSON.stringify({ paymentId })
          });
        },

        onError: (error) => {
          alert("Error: " + JSON.stringify(error));
          console.error(error);
        }

      });
    };
  </script>
</body>
</html>
